conky.text = [[
${execi 300 ~/.config/conky/Sargas/scripts/weather-v4.0.sh -g}\
#${color}${font abnes:size=35}${time %Y}${font}
${voffset 0}${alignr}${color2}${font abnes:size=35}${time %^A}${font}
${voffset 0}${alignr}${font abnes:size=35}${color}${time %^B} ${color1}${time %d}${font}
${voffset 0}${alignr}${font abnes:size=35}${color}${time %I:}${color1}${time %M}${font}
${voffset 25}${alignr}${color}${font SF Pro Rounded:medium:size=13}Today weather in ${execi 600 ~/.config/conky/Sargas/scripts/weather-v4.0.sh -n}
${voffset 2}${alignr}is ${execi 200 ~/.config/conky/Sargas/scripts/weather-v4.0.sh -d} with temperature ${execi 200 ~/.config/conky/Sargas/scripts/weather-v4.0.sh -t}°C
${voffset 2}${alignr}it feels like ${execi 200 ~/.config/conky/Sargas/scripts/weather-v4.0.sh -f}°C, and humidity is ${execi 200 ~/.config/conky/Sargas/scripts/weather-v4.0.sh -h}%
