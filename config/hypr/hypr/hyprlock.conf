# Core Colors (for borders/backgrounds)
$text     = rgb(cdd6f4)
$lavender = rgb(b4befe)
$base     = rgb(1e1e2e)
$mauve    = rgb(cba6f7)
$yellow   = rgb(f9e2af)
$red      = rgb(f38ba8)

# Alpha Variables (Raw hex for Pango markup)
$textAlpha = cdd6f4
$lavenderAlpha = b4befe
$baseAlpha = 1e1e2e
$mauveAlpha = cba6f7

$accent = $lavender
$accentAlpha = $lavenderAlpha
$font = SF Pro Rounded Bold 

# GENERAL
general {
  hide_cursor = true
}

# BACKGROUND
background {
  monitor =
  path = /home/beastviper007/Theming/Wallpapers/WuWa-Ragunna.png
  blur_passes = 2
  color = $base
}

# LAYOUT
label {
  monitor =
  text = Layout: $LAYOUT
  color = $text
  font_size = 25
  font_family = $font
  position = 30, -30
  halign = left
  valign = top
}

# TIME
label {
  monitor =
  text = $TIME
  color = $text
  font_size = 90
  font_family = $font
  position = -30, 0
  halign = right
  valign = top
}

# DATE
label {
  monitor =
  text = cmd[update:43200000] date +"%A, %d %B %Y"
  color = $text
  font_size = 25
  font_family = $font
  position = -30, -150
  halign = right
  valign = top
}

# USER AVATAR
image {
  monitor =
  path = $HOME/.face
  size = 200
  border_color = $accent
  position = 0, 100
  halign = center
  valign = center
}

# INPUT FIELD
input-field {
  monitor =
  size = 300, 60
  outline_thickness = 4
  dots_size = 0.2
  dots_spacing = 0.2
  dots_center = true
  outer_color = $accent
  inner_color = $base
  font_color = $text
  fade_on_empty = false
  placeholder_text = <span foreground="##$textAlpha"><i>󰌾 Logged in as </i><span foreground="##$accentAlpha">$USER</span></span>
  hide_input = false
  check_color = $accent
  fail_color = $red
  fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
  capslock_color = $yellow
  position = 0, -47
  halign = center
  valign = center
}
